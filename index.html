<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Israel & Iosune - Nuestra Boda</title>

<style>

body{
font-family: "Georgia", serif;
margin:0;
background:#faf7f2;
color:#333;
text-align:center;
}

header{
background:url("https://images.unsplash.com/photo-1520857014576-2c4f4c972b57") center/cover;
color:white;
padding:120px 20px;
}

header h1{
font-size:60px;
margin:0;
}

header h2{
font-weight:300;
}

section{
padding:60px 20px;
max-width:900px;
margin:auto;
}

.card{
background:white;
padding:30px;
border-radius:10px;
box-shadow:0 10px 30px rgba(0,0,0,0.1);
margin:20px 0;
}

h3{
font-size:32px;
margin-bottom:10px;
}

.countdown{
font-size:30px;
margin-top:20px;
}

button{
background:#c8a96a;
border:none;
padding:12px 25px;
font-size:16px;
color:white;
border-radius:6px;
cursor:pointer;
}

input{
padding:10px;
width:80%;
margin:10px;
border-radius:6px;
border:1px solid #ccc;
}

footer{
background:#222;
color:white;
padding:30px;
}

</style>
</head>

<body>

<header>
<h1>Israel & Iosune</h1>
<h2>¡Nos casamos!</h2>
<h2>12 Septiembre 2026</h2>
</header>

<section>

<div class="card">
<h3>Cuenta atrás</h3>
<div id="countdown" class="countdown"></div>
</div>

<div class="card">
<h3>Ceremonia</h3>
<p><b>⛪ Iglesia de La Merced</b></p>
<p>12 de septiembre de 2026</p>
<p>18:00</p>

<iframe
width="100%"
height="250"
style="border:0"
loading="lazy"
allowfullscreen
src="https://www.google.com/maps?q=Iglesia+de+La+Merced+Bollullos+Par+del+Condado&output=embed">
</iframe>

</div>

<div class="card">
<h3>Celebración</h3>
<p><b>🍾 Bodegas Andrade</b></p>
<p>21:00</p>

<iframe
width="100%"
height="250"
style="border:0"
loading="lazy"
allowfullscreen
src="https://www.google.com/maps?q=Bodegas+Andrade+Bollullos+Par+del+Condado&output=embed">
</iframe>

</div>

<div class="card">
<h3>Confirmar asistencia</h3>

<form onsubmit="enviar(event)">
<input placeholder="Tu nombre" required><br>
<input placeholder="Número de invitados"><br>
<button>Confirmar</button>
</form>

<p id="gracias"></p>

</div>

</section>

<footer>
<p>Con amor, Israel & Iosune ❤️</p>
<p>12.09.2026</p>
</footer>

<script>

var fechaBoda = new Date("Sep 12, 2026 18:00:00").getTime();

var contador = setInterval(function(){

var ahora = new Date().getTime();
var distancia = fechaBoda - ahora;

var dias = Math.floor(distancia / (1000*60*60*24));
var horas = Math.floor((distancia%(1000*60*60*24))/(1000*60*60));
var minutos = Math.floor((distancia%(1000*60*60))/(1000*60));

document.getElementById("countdown").innerHTML =
dias + " días " + horas + " horas " + minutos + " minutos";

},1000);

function enviar(e){
e.preventDefault();
document.getElementById("gracias").innerHTML="¡Gracias por confirmar! 💕";
}

</script>

</body>
</html>
